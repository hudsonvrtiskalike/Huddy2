name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install WealthKit deps
        run: npm ci
      - name: Build WealthKit
        run: npm run build

      - name: Install WizardGame deps
        run: npm ci
        working-directory: game
      - name: Build WizardGame
        run: npm run build
        working-directory: game
      - name: Copy WizardGame into dist/game
        run: mkdir -p dist/game && cp -r game/dist/. dist/game/

      - name: Install SkeletonGame deps
        run: npm ci
        working-directory: game2
      - name: Build SkeletonGame
        run: npm run build
        working-directory: game2
      - name: Copy SkeletonGame into dist/game2
        run: mkdir -p dist/game2 && cp -r game2/dist/. dist/game2/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
